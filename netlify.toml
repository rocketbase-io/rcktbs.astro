[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Legacy rocketbase.io URL redirects (301)
[[redirects]]
  from = "/imprint"
  to = "/impressum"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/datenschutz"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/kontakt"
  status = 301

[[redirects]]
  from = "/services"
  to = "/leistungen"
  status = 301

[[redirects]]
  from = "/work"
  to = "/arbeitsweise"
  status = 301

[[redirects]]
  from = "/leistungen/*"
  to = "/leistungen"
  status = 301

[[redirects]]
  from = "/referenzen/bonprix-pim"
  to = "/referenzen/bonprix"
  status = 301

[[redirects]]
  from = "/referenzen/statista-numera"
  to = "/referenzen/statista"
  status = 301

# Catch-all: unknown routes redirect to landing page
[[redirects]]
  from = "/*"
  to = "/"
  status = 301
  force = false
